info:
  name: List all movies
  type: http
  seq: 1

http:
  method: GET
  url: "{{BASE_URL}}/v1/movies?title=godfather&genres=crime,drama&page=1&page_size=5&sort=year"
  params:
    - name: title
      value: godfather
      type: query
    - name: genres
      value: crime,drama
      type: query
    - name: page
      value: "1"
      type: query
    - name: page_size
      value: "5"
      type: query
    - name: sort
      value: year
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
