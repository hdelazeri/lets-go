info:
  name: List all movies
  type: http
  seq: 1

http:
  method: GET
  url: "{{BASE_URL}}/v1/movies?sort=-runtime"
  params:
    - name: title
      value: the club
      type: query
      disabled: true
    - name: genres
      value: western
      type: query
      disabled: true
    - name: page
      value: "-1"
      type: query
      disabled: true
    - name: page_size
      value: "-1"
      type: query
      disabled: true
    - name: sort
      value: -runtime
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
