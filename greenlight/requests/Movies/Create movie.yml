info:
  name: Create movie
  type: http
  seq: 2

http:
  method: POST
  url: "{{BASE_URL}}/v1/movies"
  body:
    type: json
    data: |-
      {
        "title": "Moana",
        "year": 2016,
        "runtime": "107 mins",
        "genres": ["animation", "adventure"]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
