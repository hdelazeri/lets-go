info:
  name: List all movies
  type: http
  seq: 1

http:
  method: GET
  url: "{{BASE_URL}}/v1/movies?page=3&page_size=2"
  params:
    - name: title
      value: the club
      type: query
      disabled: true
    - name: genres
      value: western
      type: query
      disabled: true
    - name: page
      value: "3"
      type: query
    - name: page_size
      value: "2"
      type: query
    - name: sort
      value: -runtime
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
