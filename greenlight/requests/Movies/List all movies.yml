info:
  name: List all movies
  type: http
  seq: 1

http:
  method: GET
  url: "{{BASE_URL}}/v1/movies"
  params:
    - name: title
      value: godfather
      type: query
      disabled: true
    - name: genres
      value: crime,drama
      type: query
      disabled: true
    - name: page
      value: "-1"
      type: query
      disabled: true
    - name: page_size
      value: "-1"
      type: query
      disabled: true
    - name: sort
      value: foo
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
