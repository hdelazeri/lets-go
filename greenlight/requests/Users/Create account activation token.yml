info:
  name: Create account activation token
  type: http
  seq: 5

http:
  method: POST
  url: "{{BASE_URL}}/v1/tokens/activation"
  body:
    type: json
    data: |-
      {
        "email": "bob@example.com"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
