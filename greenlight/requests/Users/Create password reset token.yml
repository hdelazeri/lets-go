info:
  name: Create password reset token
  type: http
  seq: 3

http:
  method: POST
  url: "{{BASE_URL}}/v1/tokens/password-reset"
  body:
    type: json
    data: |-
      {
        "email": "alice@example.com"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
