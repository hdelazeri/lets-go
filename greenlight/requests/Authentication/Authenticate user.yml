info:
  name: Authenticate user
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/v1/tokens/authentication"
  body:
    type: json
    data: |-
      {
        "email": "faith@example.com",
        "password": "pa55word"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const token = res.body.authentication_token.token

        bru.setEnvVar("BEARER_TOKEN", token)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
